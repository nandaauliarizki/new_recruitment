services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erecruitment_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      CI_ENVIRONMENT: development
    networks:
      - erecruitment_net

  db:
    image: mysql:8.0
    container_name: erecruitment_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rekrutmen
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: rekrutmen_user
      MYSQL_PASSWORD: rekrutmen_pass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erecruitment_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: erecruitment_pma
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - erecruitment_net

volumes:
  db_data:

networks:
  erecruitment_net:
    driver: bridge
